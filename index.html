<!DOCTYPE html>
<html lang="ko" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="favi.png">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Gothic&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260717c">
    <title>Mac Note</title>

<mso:CustomDocumentProperties>
<mso:DeletedSystemTags msdt:dt="string"></mso:DeletedSystemTags>
<mso:TagListTags msdt:dt="string"></mso:TagListTags>
</mso:CustomDocumentProperties>
</xml><![endif]-->
</head>
<body class="preload">
<!-- 상단 툴바 ---------------------- -->
<div class="tb">
    <div class="l">
        <div class="tb-clock-wrap" id="tb-clock-wrap">
            <button class="tb-clock-btn" id="clock-trigger" onclick="toggleMiniCalendar()">
                <div class="top-time"></div>
            </button>
            <div class="mini-calendar" id="mini-calendar"></div>
        </div>
    </div>
    <div class="c">
        <div class="btn-new-bx" onclick="newBox()">
            <!-- <i>+</i> -->
            <span>+</span>
            <!-- <i class="fa-solid fa-plus add-bx-icon">+</i> -->
        </div>
    </div>
    <div class="r">
        <div onclick="toggleWw()">widget</div>
        <div onclick="toggleRw()">set</div>
        <label 
            for="top_user_cb" 
            class="top_user-btn-box">
            <i class="fa-solid fa-user"></i>
        </label>
    </div>
</div>
<!-- 좌우 히든 윈도우 ---------------------- -->
<input type="checkbox" id="top_user_cb" class="dpnone">

<div class="lw-back" id="lw-back" onclick="closeSidebar()"></div>
<div class="rw-back" id="rw-back" onclick="closeRw()"></div>
<div class="ww-back" id="ww-back" onclick="closeWw()"></div>
<label class="top_user-back" for="top_user_cb"></label>

<div class="lw" id="lw">
    <div class="lw-inner">
        <!-- 검색 + 뷰 전환 -->
        <div class="lw-head">
            <div class="lw-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="" oninput="lwSearch(this.value)">
            </div>
            <div class="lw-view-btns">
                <button id="lw-settings-btn" class="lw-view-btn" onclick="toggleLwSettings()" title="좌측 패널 설정" aria-expanded="false">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button id="lw-pin-btn" class="lw-view-btn lw-pin-btn" onclick="togglePin()" title="사이드바 고정">
                    <i class="fa-solid fa-thumbtack"></i>
                </button>
                <div class="lw-settings-panel" id="lw-settings-panel">
                    <div class="lw-settings-title">목록 표시 설정</div>
                    <div class="lw-settings-row" onclick="toggleLwPreview()">
                        <span class="lw-settings-label">내용 미리보기</span>
                        <button id="lw-preview-toggle" class="lw-settings-toggle" onclick="event.stopPropagation(); toggleLwPreview()" aria-pressed="true"></button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 섹션 헤더 -->
        <div class="lw-section-title">메모들</div>
        <!-- 메모 목록 -->
        <div class="lw-list" id="lw-list"></div>
        <div class="lw-create-actions">
            <button class="lw-new-btn" onclick="sidebarNewMemo()">
                <i class="fa-solid fa-plus"></i> 새 메모
            </button>
            <button class="lw-new-btn lw-new-folder-btn" onclick="sidebarNewFolder()">
                <i class="fa-regular fa-folder"></i> 새 폴더
            </button>
        </div>
    </div>
</div>
<button class="btn lw-handle" onclick="toggleSidebar()"><i class="fas fa-angle-right"></i></button>
<div class="rw" id="rw">
    <div class="rw-inner">
        <div class="rw-head">
            <span class="rw-title">settings</span>
        </div>
        <div class="rw-section-title">theme</div>
        <div class="rw-theme-row">
            <button class="rw-theme-btn" id="btn-theme-light" onclick="setTheme('light')">
                <i class="fa-solid fa-sun"></i>
                <span>라이트</span>
            </button>
            <button class="rw-theme-btn" id="btn-theme-auto" onclick="setTheme('auto')">
                <i class="fa-solid fa-circle-half-stroke"></i>
                <span>자동</span>
            </button>
            <button class="rw-theme-btn" id="btn-theme-dark" onclick="setTheme('dark')">
                <i class="fa-solid fa-moon"></i>
                <span>다크</span>
            </button>
        </div>
        <div class="rw-section-title">background image</div>
        <div class="rw-bg-row">
            <button class="rw-bg-btn" id="btn-bg-open" onclick="openBgModal()">
                <i class="fa-regular fa-image"></i>
                <span>배경 설정 열기</span>
            </button>
        </div>
    </div>
</div>

<div class="bg-modal-back" id="bg-modal-back" onclick="closeBgModal()"></div>
<section class="bg-modal" id="bg-modal" aria-label="배경 이미지 설정">
    <div class="bg-modal-head">
        <div class="bg-modal-tabs">
            <button class="bg-tab-btn active" id="bg-tab-library" onclick="switchBgTab('library')">라이브러리</button>
            <button class="bg-tab-btn" id="bg-tab-upload" onclick="switchBgTab('upload')">업로드</button>
            <button class="bg-tab-btn" id="bg-tab-link" onclick="switchBgTab('link')">링크</button>
        </div>
        <button class="bg-close-btn" onclick="closeBgModal()">닫기</button>
    </div>

    <div class="bg-tab-panel bg-tab-panel--library" id="bg-panel-library">
        <input
            type="text"
            id="bg-library-search"
            class="bg-search-input"
            placeholder="라이브러리 이미지 검색"
            oninput="renderBgLibrary(this.value)">
        <div class="bg-grid" id="bg-library-grid"></div>
    </div>

    <div class="bg-tab-panel dpnone" id="bg-panel-upload">
        <div class="bg-upload-help">이미지 파일을 선택하면 바로 배경에 적용되고, 앱 내부(IndexedDB)에 저장됩니다.</div>
        <input type="file" id="bg-upload-input" accept="image/*" onchange="handleBgUpload(event)">
    </div>

    <div class="bg-tab-panel dpnone" id="bg-panel-link">
        <input
            type="text"
            id="bg-link-input"
            class="bg-search-input"
            placeholder="https://example.com/image.jpg">
        <div class="bg-link-actions">
            <button class="bg-action-btn" onclick="applyBgLink()">링크 적용</button>
        </div>
    </div>

    <div class="bg-modal-foot">
        <button class="bg-remove-btn" onclick="clearCustomBackground()">제거</button>
    </div>
</section>
<div class="ww">
    <div class="contanier widget-search-container">
        <div class="widget-panel-head">
            <span class="widget-panel-title">widget</span>
        </div>

        <div class="widget-section-head">
            <span class="widget-section-title">search bar</span>
            <button
                type="button"
                class="widget-settings-btn"
                id="widget-settings-btn"
                onclick="toggleWidgetSettings()"
                aria-label="검색바 설정"
                aria-expanded="false">
                <i class="fa-solid fa-gear"></i>
            </button>
            <div class="widget-settings-panel" id="widget-settings-panel">
                <div class="widget-settings-title">검색바 설정</div>
                <div class="widget-settings-list" id="widget-settings-list"></div>
            </div>
        </div>

        <div class="widget-carousel-viewport" id="widget-carousel-viewport">
            <div class="widget-carousel-track" id="widget-carousel-track">
                <div class="widget-slide" data-engine="google">
                    <form action="https://www.google.com/search" method="GET" target="_blank" class="searchbar widget-searchbar widget-searchbar-google">
                        <div class="search-icon"><i class="fa-brands fa-google"></i></div>
                        <input type="text" name="q" placeholder="">
                        <button type="submit" class="search-icon search-submit widget-search-submit">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </form>
                </div>

                <div class="widget-slide" data-engine="naver">
                    <form action="https://search.naver.com/search.naver" method="GET" target="_blank" class="searchbar widget-searchbar widget-searchbar-naver">
                        <div class="search-icon"><span class="naver-mark">N</span></div>
                        <input type="text" name="query" placeholder="">
                        <button type="submit" class="search-icon search-submit widget-search-submit">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </form>
                </div>

                <div class="widget-slide" data-engine="youtube">
                    <form action="https://www.youtube.com/results" method="GET" target="_blank" class="searchbar widget-searchbar widget-searchbar-youtube">
                        <div class="search-icon"><i class="fa-brands fa-youtube"></i></div>
                        <input type="text" name="search_query" placeholder="">
                        <button type="submit" class="search-icon search-submit widget-search-submit">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="widget-dots" id="widget-dots"></div>
    </div>
</div>
<!-- 메인 앱 화면 ---------------------- -->
<main id="main">
    <div class="ws"></div>
    <div class="bs" onclick="bsClick()"></div>
</main>

<script>
    // 초기 로드 트렌지션 해제
    const body = () => {document.body.removeClass('preload')}

<script src="js/toolbar.js"></script>
<script src="js/box-ctrl.js?v=20260717g"></script>
<script src="js/app.js?v=20260717c"></script>
<script src="js/box.js?v=20260717d"></script>
<script src="js/sidebar.js?v=20260717f"></script>

<script src="https://kit.fontawesome.com/e4704dcbbd.js" crossorigin="anonymous"></script>
</body>
</html>
